<!DOCTYPE html>

<head>
    <title>TreeLand</title>
    <style>
        /* 基础样式设置 */
        /* 确保html和body元素占据整个视口高度 */
        html,
        body {
            height: 100%;
            /* 设置高度为100% */
            margin: 0;
            /* 移除默认外边距 */
            padding: 0;
            /* 移除默认内边距 */
            box-sizing: border-box;
            /* 盒模型设置为border-box */
        }
    </style>
</head>

<body>
    <!-- 主容器：实现整体页面居中 -->
    <div style="
            display: flex;              /* 使用Flexbox布局 */
            justify-content: center;     /* 水平居中 */
            align-items: center;         /* 垂直居中 */
            min-height: 100vh;           /* 最小高度为视口高度 */
            padding: 20px;               /* 内边距20px */
            box-sizing: border-box;      /* 盒模型设置 */
            /* border: black 5px solid; */
        ">
        <!-- 内容容器：水平排列文字和图片 -->
        <div style="
                display: flex;              /* 使用Flexbox布局 */
                flex-direction: row;        /* 水平排列方向 */
                align-items: center;         /* 垂直对齐方式：居中 */
                max-width: 90%;             /* 最大宽度为视口的90% */
                max-height: 80vh;           /* 最大高度为视口的80% */
                /* border: black 5px solid; */
            ">
            <!-- 文字部分 -->
            <div style="
                    font-size: 3vw;          /* 文字大小为视口宽度的3% */
                    margin: 5%;              /* 外边距5% */
                    padding: 5%;             /* 内边距5% */
                    flex: 1;                 /* 弹性分配：占据1份空间 */
                    /* border: black 5px solid; */
                ">
                <p> TreeLand <!-- 第一行文字 -->
                    <br> <!-- 换行 -->
                    Build you own dream land. <!-- 第二行文字 -->
                </p>
            </div>

            <!-- 图片部分 -->
            <div style="
                    flex: 1;                 /* 弹性分配：占据1份空间 */
                    display: flex;              /* 使用Flexbox布局 */
                    justify-content: center;     /* 水平居中图片 */
                    align-items: center;         /* 垂直居中图片 */
                    /* border: black 5px solid; */
                ">
                <img src="resouces\preview.jpg" style="
                        width: 100%;              /* 宽度100% */
                        height: auto;             /* 高度自动，保持比例 */
                        max-width: 100%;          /* 最大宽度100% */
                        max-height: 70vh;         /* 最大高度为视口的70% */
                        object-fit: contain;      /* 保持图片比例，完整显示 */
                        /* border: black 5px solid; */
                    ">
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer style="
            text-align: center;          /* 文字居中 */
            padding: 20px;               /* 内边距20px */
            background-color: #f4f4f4;   /* 背景颜色 */
            margin-top: 20px;            /* 顶部外边距20px */
        ">
        <p>2026 凌落倾风 All rights reserved. | <a href="https://lingfengsama.github.io/Ling"
                target="_blank">https://lingfengsama.github.io/Ling</a></p> <!-- 版权信息 -->
    </footer>
</body>
